<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSS MATH SOLVER </title>
<style>
    body { background: linear-gradient(135deg, #0a0a0a, #001a33); color: #fff; font-family: Arial; padding: 15px; text-align: center; }
    h1 { color: #00ff88; font-size: 30px; text-shadow: 0 0 10px #00ff88; }
.subtitle { color:#aaa; margin-bottom: 15px; }
.box { background: #1a1a1a; padding: 20px; border-radius: 20px; max-width: 700px; margin: auto; box-shadow: 0 0 20px #00ff88; }
    input { width: 95%; padding: 15px; font-size: 20px; border-radius: 10px; border: 2px solid #00ff88; background: #000; color: #fff; margin-bottom: 10px; }
.btn-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    button { flex: 1; min-width: 120px; padding: 15px; font-size: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { transform: scale(1.05); }
    #listenBtn { background: #ff8800; color: #000; }
    #solveBtn { background: linear-gradient(90deg, #00ff88, #00ccff); color: #000; }
    #speakBtn { background: #00ccff; color: #000; }
    #pdfBtn { background: #aa00ff; color: #fff; }
    #clearBtn { background: #ff0044; color: #fff; }
    #historyBtn { background: #ffaa00; color: #000; }
    #timerBtn { background: #00ff88; color: #000; }
    #answer { font-size: 16px; color: #00ff88; margin-top: 20px; background: #0f0f0f; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-line; line-height: 2; min-height: 150px; }
.step { color: #00ccff; font-weight: bold; }
.ans { color: #ff8800; font-weight: bold; font-size: 20px; }
.topics { font-size: 12px; color: #888; margin-top: 10px; }
#timer { color: #ff8800; font-size: 18px; font-weight: bold; }
.history { background: #111; padding: 10px; border-radius: 10px; margin-top: 10px; text-align: left; font-size: 13px; max-height: 150px; overflow-y: auto; }
</style>
</head>
<body>
    <h1>📱 JSS MATH SOLVER PRO </h1>
    <div class="subtitle">15 TOPICS MEGA PACK!</div>

    <div class="box">
        <div id="timer">⏰ Exam Mode: OFF</div>
        <input type="text" id="problemInput" placeholder="Enter your math question here ...">

        <div class="btn-row">
            <button id="listenBtn" onclick="startVoice()">🎤 LISTEN</button>
            <button id="solveBtn" onclick="solveMath()">✨ SOLVE</button>
            <button id="speakBtn" onclick="speakAnswer()">🔊 SPEAK</button>
            <button id="timerBtn" onclick="toggleTimer()">⏰ TIMER</button>
        </div>
        <div class="btn-row">
            <button id="pdfBtn" onclick="downloadPDF()">📄 SAVE PDF</button>
            <button id="historyBtn" onclick="showHistory()">📚 HISTORY</button>
            <button id="clearBtn" onclick="clearAll()">🗑️ CLEAR</button>
        </div>

        <div id="answer">Answer and steps will appear here...</div>
        <div id="historyBox" class="history" style="display:none;"></div>
        <div class="topics">V5.0: 15 TOPICS | PERCENT, AREA, VOLUME, INTEREST, HCF, LCM, MEAN, MODE, MEDIAN, FACTORIZE, FRACTIONS, EQUATIONS, PYTHAGORAS, CALC, WORDS</div>
    </div>

<script>
let lastAnswerText = "";
let history = JSON.parse(localStorage.getItem('mathHistory')) || [];
let timerInterval, seconds = 0, timerOn = false;

function wordsToNumbers(text) {
    const words = {"zero":0,"one":1,"two":2,"three":3,"four":4,"five":5,"six":6,"seven":7,"eight":8,"nine":9,"ten":10};
    let newText = text;
    for(let word in words) { newText = newText.replace(new RegExp(word, "gi"), words[word]); }
    return newText;
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';
function startVoice() {
    recognition.start();
    document.getElementById('listenBtn').innerText = "🎤 LISTENING...";
}
recognition.onresult = (e) => {
    document.getElementById('problemInput').value = e.results[0][0].transcript;
    document.getElementById('listenBtn').innerText = "🎤 LISTEN";
}
recognition.onerror = () => { document.getElementById('listenBtn').innerText = "🎤 LISTEN"; }

function speakAnswer() {
    if(lastAnswerText === "") { alert("Solve first!"); return; }
    const speech = new SpeechSynthesisUtterance(lastAnswerText);
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}

function clearAll() {
    document.getElementById('problemInput').value = "";
    document.getElementById('answer').innerHTML = "Answer and steps will appear here...";
    lastAnswerText = "";
    window.speechSynthesis.cancel();
}

function toggleTimer() {
    timerOn =!timerOn;
    if(timerOn) {
        seconds = 0;
        timerInterval = setInterval(()=>{ seconds++; document.getElementById('timer').innerText = `⏰ Time: ${seconds}s`; },1000);
        document.getElementById('timerBtn').innerText = "⏰ STOP";
    } else {
        clearInterval(timerInterval);
        document.getElementById('timerBtn').innerText = "⏰ TIMER";
        document.getElementById('timer').innerText = `⏰ Exam Mode: OFF`;
    }
}

function saveHistory(q,a) {
    history.unshift({q:q, a:a, time:new Date().toLocaleTimeString()});
    if(history.length>10) history.pop();
    localStorage.setItem('mathHistory', JSON.stringify(history));
}

function showHistory() {
    const box = document.getElementById('historyBox');
    if(box.style.display==="none") {
        box.style.display="block";
        box.innerHTML = "<b>📚 LAST 10 QUESTIONS:</b><br>" + history.map(h=>`<b>${h.time}</b> Q: ${h.q}<br>A: ${h.a}<hr>`).join('');
    } else { box.style.display="none"; }
}

function downloadPDF() {
    let text = "JSS MATH SOLVER WORKING\n" + document.getElementById('answer').innerText;
    let blob = new Blob([text], {type: 'text/plain'});
    let link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'JSS_Math_Working.txt';
    link.click();
}

function gcd(a,b){ return b==0?a:gcd(b,a%b) }
function lcm(a,b){ return (a*b)/gcd(a,b) }

function factorize(n) {
    let factors = [];
    let steps = [];
    let temp = n;
    for(let i=2; i<=n; i++) {
        while(temp % i === 0) {
            factors.push(i);
            steps.push(`${temp} ÷ ${i} = ${temp/i}`);
            temp = temp / i;
        }
    }
    return {factors, steps};
}

function solveMath() {
    let p = document.getElementById('problemInput').value.toLowerCase();
    let originalQ = document.getElementById('problemInput').value;
    p = wordsToNumbers(p);
    p = p.replace(/x/g, '*').replace(/×/g, '*').replace(/equals to/g, '=').replace(/is/g, '=').replace(/and/g, ',').replace(/\s+/g, '');

    let result = "";
    lastAnswerText = "";

    try {
        // NEW: PERCENTAGE
        if(p.includes('percent') || p.includes('%')) {
            const nums = p.match(/\d+/g).map(Number);
            if(p.includes('of')) {
                let ans = (nums[0]/100) * nums[1];
                result = `<span class="step">STEP 1:</span> ${nums[0]}% of ${nums[1]}\n<span class="step">STEP 2:</span> ${nums[0]}/100 × ${nums[1]}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
                lastAnswerText = `The answer is ${ans}`;
            }
        }
        // NEW: AREA
        else if(p.includes('area')) {
            const nums = p.match(/\d+/g).map(Number);
            if(p.includes('circle')) {
                let r = nums[0]; let area = 3.142 * r * r;
                result = `<span class="step">STEP 1:</span> Area = πr²\n<span class="step">STEP 2:</span> 3.142 × ${r} × ${r}\n<span class="ans">✅ ANSWER: ${area.toFixed(2)} sq units</span>`;
            }
            else if(p.includes('rectangle')) {
                let area = nums[0] * nums[1];
                result = `<span class="step">STEP 1:</span> Area = Length × Breadth\n<span class="ans">✅ ANSWER: ${area} sq units</span>`;
            }
        }
        // NEW: VOLUME
        else if(p.includes('volume')) {
            const nums = p.match(/\d+/g).map(Number);
            if(p.includes('cube')) {
                let vol = nums[0] * nums[0] * nums[0];
                result = `<span class="step">STEP 1:</span> Volume = side³\n<span class="ans">✅ ANSWER: ${vol} cubic units</span>`;
            }
            else if(p.includes('cuboid')) {
                let vol = nums[0] * nums[1] * nums[2];
                result = `<span class="step">STEP 1:</span> Volume = L × B × H\n<span class="ans">✅ ANSWER: ${vol} cubic units</span>`;
            }
        }
        // NEW: SIMPLE INTEREST
        else if(p.includes('interest')) {
            const nums = p.match(/\d+/g).map(Number);
            let p_amt = nums[0], r = nums[1], t = nums[2];
            let si = (p_amt * r * t)/100;
            result = `<span class="step">STEP 1:</span> SI = (P × R × T)/100\n<span class="step">STEP 2:</span> (${p_amt} × ${r} × ${t})/100\n<span class="ans">✅ ANSWER: SI = ${si}</span>`;
            lastAnswerText = `Simple interest is ${si}`;
        }
        else if(p.includes('hcf') || p.includes('highestcommonfactor')) {
            const nums = p.match(/\d+/g).map(Number);
            let hcf = nums.reduce((a,b)=>gcd(a,b));
            result = `<span class="step">STEP 1:</span> Find factors of each number\n<span class="step">STEP 2:</span> Pick highest common\n<span class="ans">✅ ANSWER: HCF = ${hcf}</span>`;
            lastAnswerText = `The HCF is ${hcf}`;
        }
        else if(p.includes('lcm') || p.includes('lowestcommonmultiple')) {
            const nums = p.match(/\d+/g).map(Number);
            let l = nums.reduce((a,b)=>lcm(a,b));
            result = `<span class="step">STEP 1:</span> Find multiples\n<span class="step">STEP 2:</span> Pick lowest common\n<span class="ans">✅ ANSWER: LCM = ${l}</span>`;
            lastAnswerText = `The LCM is ${l}`;
        }
        else if(p.includes('mode')) {
            const nums = p.match(/\d+/g).map(Number);
            let freq = {};
            nums.forEach(n => freq[n] = (freq[n]||0)+1);
            let maxFreq = Math.max(...Object.values(freq));
            let modes = Object.keys(freq).filter(k => freq[k]===maxFreq);
            result = `<span class="step">STEP 1:</span> Count frequency: ${JSON.stringify(freq)}\n<span class="step">STEP 2:</span> Most frequent = ${maxFreq} times\n<span class="ans">✅ ANSWER: Mode = ${modes.join(', ')}</span>`;
            lastAnswerText = `The mode is ${modes.join(' and ')}`;
        }
        else if(p.includes('median')) {
            const nums = p.match(/\d+/g).map(Number).sort((a,b)=>a-b);
            let mid = Math.floor(nums.length/2);
            let median = nums.length % 2!== 0? nums[mid] : (nums[mid-1]+nums[mid])/2;
            result = `<span class="step">STEP 1:</span> Arrange: ${nums.join(', ')}\n<span class="step">STEP 2:</span> Middle number\n<span class="ans">✅ ANSWER: Median = ${median}</span>`;
            lastAnswerText = `The median is ${median}`;
        }
        else if(p.includes('factorize') || p.includes('primefactors')) {
            const nums = p.match(/\d+/g);
            if(nums) {
                let num = parseInt(nums[0]);
                let {factors, steps} = factorize(num);
                result = `<span class="step">STEP 1:</span> Start dividing by smallest prime\n`;
                steps.forEach(s => result += `<span class="step"></span> ${s}\n`);
                result += `<span class="ans">✅ ANSWER: ${num} = ${factors.join(' × ')}</span>`;
                lastAnswerText = `The prime factors of ${num} are ${factors.join(' times ')}`;
            }
        }
        else if(p.includes('mean') || p.includes('average')) {
            const nums = p.match(/\d+/g).map(Number);
            let sum = nums.reduce((a,b)=>a+b,0); let mean = sum/nums.length;
            result = `<span class="step">STEP 1:</span> Add numbers: ${nums.join(' + ')} = ${sum}\n<span class="step">STEP 2:</span> Divide by ${nums.length} numbers\n<span class="ans">✅ ANSWER: Mean = ${mean}</span>`;
            lastAnswerText = `The mean is ${mean}`;
        }
        else if(p.startsWith('pythagoras')) {
            const nums = p.match(/\d+/g).map(Number);
            let c = Math.sqrt(nums[0]*nums[0] + nums[1]*nums[1]);
            result = `<span class="step">STEP 1:</span> c² = ${nums[0]}² + ${nums[1]}² = ${nums[0]*nums[0] + nums[1]*nums[1]}\n<span class="ans">✅ ANSWER: ${c.toFixed(2)}</span>`;
            lastAnswerText = `The hypotenuse is ${c.toFixed(2)}`;
        }
        else if(p.match(/\d+\/\d+[\+\-]\d+\/\d+/)) {
            let match = p.match(/(\d+)\/(\d+)([\+\-])(\d+)\/(\d+)/);
            let a=parseInt(match[1]), b=parseInt(match[2]), op=match[3], c=parseInt(match[4]), d=parseInt(match[5]);
            let lcd = lcm(b,d); let newA = a*(lcd/b), newC = c*(lcd/d); let ans = op=='+'? newA+newC : newA-newC;
            result = `<span class="step">STEP 1:</span> LCD of ${b} and ${d} = ${lcd}\n<span class="step">STEP 2:</span> ${newA} ${op} ${newC} / ${lcd}\n<span class="ans">✅ ANSWER: ${ans}/${lcd}</span>`;
        }
        else if(p.includes('*') && p.includes('=')) {
            let match = p.match(/(\d*)\*([\+\-])(\d+)=(\d+)/);
            if(match){
                let a = match[1]==''?1:parseFloat(match[1]); let b = parseFloat(match[3]); let c = parseFloat(match[4]);
                if(match[2]=='-') b = -b; let x = (c-b)/a;
                result = `<span class="step">STEP 1:</span> ${a}x ${match[2]} ${Math.abs(b)} = ${c}\n<span class="step">STEP 2:</span> x = ${c-b}/${a}\n<span class="ans">✅ ANSWER: x = ${x}</span>`;
                lastAnswerText = `x equals ${x}`;
            }
        }
        else if(p.match(/[\d\+\-\*\/\.\(\)]/)) {
            let ans = eval(p);
            result = `<span class="step">STEP 1:</span> Calculate: ${originalQ}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The answer is ${ans}`;
        }
        else { result = "Try: percent 20 of 50 or area circle 7 or interest 1000,5,2"; }

    } catch(e) { result = "Check typing. Example: area circle 7"; }

    document.getElementById('answer').innerHTML = result;
    saveHistory(originalQ, result.replace(/<[^>]*>/g, '').split('✅ ANSWER:')[1]);
}
</script>
</body>
</html>
