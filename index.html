<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSS MATH SOLVER</title>
<style>
    body { background: #0a0a0a; color: #fff; font-family: Arial; padding: 15px; text-align: center; }
    h1 { color: #00ff88; font-size: 28px; }
.subtitle { color:#aaa; margin-bottom: 15px; }
.box { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 650px; margin: auto; }
    input { width: 95%; padding: 15px; font-size: 20px; border-radius: 10px; border: 2px solid #00ff88; background: #000; color: #fff; margin-bottom: 10px; }
 .btn-row { display: flex; gap: 10px; }
    button { flex: 1; padding: 15px; font-size: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    #listenBtn { background: #ff8800; color: #000; }
    #solveBtn { background: linear-gradient(90deg, #00ff88, #00ccff); color: #000; }
    #speakBtn { background: #00ccff; color: #000; }
    #answer { font-size: 16px; color: #00ff88; margin-top: 20px; background: #0f0f0f; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-line; line-height: 1.8; min-height: 100px; }
.step { color: #00ccff; }
.ans { color: #ff8800; font-weight: bold; font-size: 20px; }
</style>
</head>
<body>
    <h1>📱 JSS MATH SOLVER</h1>
    <div class="subtitle">AI TEACHER - Voice + Steps + Real Math</div>
    
    <div class="box">
        <input type="text" id="problemInput" placeholder="Type: 3x3, 12+5, 10 percent of 500">
        
        <div class="btn-row">
            <button id="listenBtn" onclick="startVoice()">🎤 LISTEN</button>
            <button id="solveBtn" onclick="solveMath()">✨ SOLVE</button>
            <button id="speakBtn" onclick="speakAnswer()">🔊 SPEAK</button>
        </div>
        
        <div id="answer">Answer and steps will appear here...</div>
    </div>

<script>
let lastAnswerText = "";

// LISTEN
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';
function startVoice() {
    recognition.start();
    document.getElementById('listenBtn').innerText = "🎤 LISTENING...";
}
recognition.onresult = (e) => {
    document.getElementById('problemInput').value = e.results[0][0].transcript;
    document.getElementById('listenBtn').innerText = "🎤 LISTEN";
}

// SPEAK
function speakAnswer() {
    if(lastAnswerText === "") { alert("Solve first!"); return; }
    const speech = new SpeechSynthesisUtterance(lastAnswerText);
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}

// REAL MATH SOLVER
function solveMath() {
    let p = document.getElementById('problemInput').value;
    let result = "";
    lastAnswerText = "";
    
    p = p.replace(/x/g, '*').replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
    
    try {
        if(p.match(/[\d\+\-\*\/\.\(\)]/)) {
            let ans = eval(p);
            result = `<span class="step">STEP 1:</span> Calculate: ${p}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The answer is ${ans}`;
        }
        else if(p.toLowerCase().includes('percent')) {
            const nums = p.match(/\d+\.?\d*/g);
            let ans = nums[0]*nums[1]/100;
            result = `<span class="step">STEP 1:</span> ${nums[1]}% of ${nums[0]} = ${nums[0]} x ${nums[1]}/100\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The answer is ${ans}`;
        }
        else { result = "Try: 3x3, 12+5, 10 percent of 500"; }
        
    } catch(e) { result = "Error. Try: 3*3 or 3x3"; }
    
    document.getElementById('answer').innerHTML = result;
}
</script>
</body>
</html>
