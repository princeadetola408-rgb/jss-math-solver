<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSS GENIUS V7.0 - VOICE CONTROL</title>
<style>
    body { background: #0a0a0a; color: #fff; font-family: Arial; padding: 15px; text-align: center; }
    h1 { color: #00ff88; }
.box { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 650px; margin: auto; }
    input { width: 95%; padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #00ff88; background: #000; color: #fff; margin-bottom: 10px; }
   .btn-row { display: flex; gap: 10px; }
    button { flex: 1; padding: 15px; font-size: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    #listenBtn { background: #ff8800; color: #000; } /* ORANGE = LISTEN */
    #solveBtn { background: linear-gradient(90deg, #00ff88, #00ccff); color: #000; } /* GREEN = SOLVE */
    #speakBtn { background: #00ccff; color: #000; } /* BLUE = SPEAK */
    #answer { font-size: 16px; color: #00ff88; margin-top: 20px; background: #0f0f0f; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-line; line-height: 1.8; min-height: 100px; }
.step { color: #00ccff; }
.ans { color: #ff8800; font-weight: bold; font-size: 18px; }
.listening { animation: pulse 1s infinite; }
 @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,136,0,0.7); } 100% { box-shadow: 0 0 0 15px rgba(255,136,0,0); }
</style>
</head>
<body>
    <h1>📱 JSS GENIUS V7.0</h1>
    <div style="color:#aaa">AI TEACHER - Separate Voice Controls</div>
    
    <div class="box">
        <input type="text" id="problemInput" placeholder="Tap LISTEN or type your question...">
        
        <div class="btn-row">
            <button id="listenBtn" onclick="startVoice()">🎤 LISTEN</button>
            <button id="solveBtn" onclick="solveMath()">✨ SOLVE</button>
            <button id="speakBtn" onclick="speakAnswer()">🔊 SPEAK</button>
        </div>
        
        <div id="answer">Answer and steps will appear here...</div>
    </div>

<script>
let lastAnswerText = ""; // This stores what to speak

// 1. LISTENING BUTTON
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';

function startVoice() {
    document.getElementById('listenBtn').classList.add('listening');
    document.getElementById('listenBtn').innerText = "🎤 LISTENING...";
    recognition.start();
}
recognition.onresult = (e) => {
    document.getElementById('problemInput').value = e.results[0][0].transcript;
    document.getElementById('listenBtn').classList.remove('listening');
    document.getElementById('listenBtn').innerText = "🎤 LISTEN";
}

// 2. SPEAKING BUTTON
function speakAnswer() {
    if(lastAnswerText === "") {
        alert("Solve a problem first!");
        return;
    }
    const speech = new SpeechSynthesisUtterance(lastAnswerText);
    speech.lang = 'en-US';
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}

// 3. SOLVE BUTTON
function gcd(a,b){ return b==0?a:gcd(b,a%b) }
function lcm(a,b){ return (a*b)/gcd(a,b) }

function solveMath() {
    const p = document.getElementById('problemInput').value.toLowerCase();
    const nums = p.match(/-?\d+\.?\d*/g) || [];
    let result = "";
    lastAnswerText = "";
    
    try {
        if(p.includes('percent')) {
            let ans = nums[0]*nums[1]/100;
            result = `<span class="step">STEP 1:</span> ${nums[1]}% of ${nums[0]} = ${nums[0]} x ${nums[1]}/100\n<span class="step">STEP 2:</span> = ${ans}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `Step 1. ${nums[1]} percent of ${nums[0]}. Step 2. The answer is ${ans}`;
        }
        else if(p.includes('lcm')) {
            let ans = lcm(nums[0], nums[1]);
            result = `<span class="step">STEP 1:</span> Find LCM of ${nums[0]} and ${nums[1]}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The LCM of ${nums[0]} and ${nums[1]} is ${ans}`;
        }
        else if(p.includes('x') && p.includes('=')) {
            let a = parseFloat(p.match(/(\d+)x/)[1]); let b = parseFloat(p.match(/x \+ (\d+)/)[1]); let c = parseFloat(p.match(/= (\d+)/)[1]);
            let x = (c-b)/a;
            result = `<span class="step">STEP 1:</span> ${a}x + ${b} = ${c}\n<span class="step">STEP 2:</span> x = ${(c-b)}/${a}\n<span class="ans">✅ ANSWER: x = ${x}</span>`;
            lastAnswerText = `Solving ${a}x plus ${b} equals ${c}. The answer is x equals ${x}`;
        }
        else { result = "Try: 10 percent of 500, LCM of 12 and 18"; lastAnswerText = "Please try an example"; }
        
    } catch(e) { result = "Check your typing"; lastAnswerText = "Check your typing"; }
    
    document.getElementById('answer').innerHTML = result;
}
</script>
</body>
</html>
