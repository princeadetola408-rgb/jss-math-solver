<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSS MATH SOLVER</title>
<style>
    body { background: #0a0a0a; color: #fff; font-family: Arial; padding: 15px; text-align: center; }
    h1 { color: #00ff88; font-size: 28px; }
.subtitle { color:#aaa; margin-bottom: 15px; }
.box { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 650px; margin: auto; }
    input { width: 95%; padding: 15px; font-size: 20px; border-radius: 10px; border: 2px solid #00ff88; background: #000; color: #fff; margin-bottom: 10px; }
.btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
    button { flex: 1; padding: 15px; font-size: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    #listenBtn { background: #ff8800; color: #000; }
    #solveBtn { background: linear-gradient(90deg, #00ff88, #00ccff); color: #000; }
    #speakBtn { background: #00ccff; color: #000; }
    #clearBtn { background: #ff0044; color: #fff; width: 100%; }
    #answer { font-size: 16px; color: #00ff88; margin-top: 20px; background: #0f0f0f; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-line; line-height: 1.8; min-height: 120px; }
.step { color: #00ccff; }
.ans { color: #ff8800; font-weight: bold; font-size: 20px; }
.topics { font-size: 12px; color: #888; margin-top: 10px; }
</style>
</head>
<body>
    <h1>📱 JSS MATH SOLVER</h1>
    <div class="subtitle">AI TEACHER - Voice + Steps + Real Math</div>

    <div class="box">
        <input type="text" id="problemInput" placeholder="Try: LCM of eight and 12">

        <div class="btn-row">
            <button id="listenBtn" onclick="startVoice()">🎤 LISTEN</button>
            <button id="solveBtn" onclick="solveMath()">✨ SOLVE</button>
            <button id="speakBtn" onclick="speakAnswer()">🔊 SPEAK</button>
        </div>

        <button id="clearBtn" onclick="clearAll()">🗑️ CLEAR</button>

        <div id="answer">Answer and steps will appear here...</div>
        <div class="topics">Supports: +, -, x, /, %, LCM, HCF, Fractions, Algebra, Area</div>
    </div>

<script>
let lastAnswerText = "";

// CONVERT WORDS TO NUMBERS
function wordsToNumbers(text) {
    const words = {
        "zero":0,"one":1,"two":2,"three":3,"four":4,"five":5,"six":6,"seven":7,"eight":8,"nine":9,"ten":10,
        "eleven":11,"twelve":12,"thirteen":13,"fourteen":14,"fifteen":15,"sixteen":16,"seventeen":17,"eighteen":18,"nineteen":19,
        "twenty":20,"thirty":30,"forty":40,"fifty":50,"sixty":60,"seventy":70,"eighty":80,"ninety":90,"hundred":100
    };
    let newText = text;
    for(let word in words) {
        newText = newText.replace(new RegExp(word, "gi"), words[word]);
    }
    return newText;
}

// LISTEN
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';
function startVoice() {
    recognition.start();
    document.getElementById('listenBtn').innerText = "🎤 LISTENING...";
}
recognition.onresult = (e) => {
    document.getElementById('problemInput').value = e.results[0][0].transcript;
    document.getElementById('listenBtn').innerText = "🎤 LISTEN";
}

// SPEAK
function speakAnswer() {
    if(lastAnswerText === "") { alert("Solve first!"); return; }
    const speech = new SpeechSynthesisUtterance(lastAnswerText);
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}

// CLEAR
function clearAll() {
    document.getElementById('problemInput').value = "";
    document.getElementById('answer').innerHTML = "Answer and steps will appear here...";
    lastAnswerText = "";
    window.speechSynthesis.cancel();
}

// MATH HELPERS
function gcd(a,b){ return b==0?a:gcd(b,a%b) }
function lcm(a,b){ return (a*b)/gcd(a,b) }

// REAL MATH SOLVER
function solveMath() {
    let p = document.getElementById('problemInput').value.toLowerCase();
    p = wordsToNumbers(p); // <-- CONVERT "eight" TO "8"
    
    let result = "";
    lastAnswerText = "";
    p = p.replace(/x/g, '*').replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');

    try {
        if(p.includes('/')) {
            let ans = eval(p);
            result = `<span class="step">STEP 1:</span> Calculate: ${p}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The answer is ${ans}`;
        }
        else if(p.includes('hcf')) {
            const nums = p.match(/\d+/g);
            let ans = gcd(parseInt(nums[0]), parseInt(nums[1]));
            result = `<span class="step">STEP 1:</span> Find HCF of ${nums[0]} and ${nums[1]}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The HCF of ${nums[0]} and ${nums[1]} is ${ans}`;
        }
        else if(p.includes('area')) {
            const nums = p.match(/\d+/g);
            let ans = nums[0] * nums[1];
            result = `<span class="step">STEP 1:</span> Area = Length x Breadth\n<span class="step">STEP 2:</span> ${nums[0]} x ${nums[1]}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The area is ${ans}`;
        }
        else if(p.includes('lcm')) {
            const nums = p.match(/\d+/g);
            let ans = lcm(nums[0], nums[1]);
            result = `<span class="step">STEP 1:</span> Find LCM of ${nums[0]} and ${nums[1]}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The LCM of ${nums[0]} and ${nums[1]} is ${ans}`;
        }
        else if(p.includes('percent')) {
            const nums = p.match(/\d+\.?\d*/g);
            let ans = nums[0]*nums[1]/100;
            result = `<span class="step">STEP 1:</span> ${nums[1]}% of ${nums[0]} = ${nums[0]} x ${nums[1]}/100\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The answer is ${ans}`;
        }
        else if(p.includes('x') && p.includes('=')) {
            let parts = p.match(/(\d+)x \+ (\d+) = (\d+)/);
            let a=parts[1], b=parts[2], c=parts[3]; let x = (c-b)/a;
            result = `<span class="step">STEP 1:</span> ${a}x + ${b} = ${c}\n<span class="step">STEP 2:</span> x = ${(c-b)}/${a}\n<span class="ans">✅ ANSWER: x = ${x}</span>`;
            lastAnswerText = `The answer is x equals ${x}`;
        }
        else if(p.match(/[\d\+\-\*\/\.\(\)]/)) {
            let ans = eval(p);
            result = `<span class="step">STEP 1:</span> Calculate: ${p}\n<span class="ans">✅ ANSWER: ${ans}</span>`;
            lastAnswerText = `The answer is ${ans}`;
        }
        else { result = "Try: LCM of eight and 12"; }

    } catch(e) { result = "Check your typing. Example: LCM of 8 and 12"; }

    document.getElementById('answer').innerHTML = result;
}
</script>
</body>
</html>
